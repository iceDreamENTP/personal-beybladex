schema_version: 3
last_updated: 2026-07-21
configuration_model:
  org: "Original；Takara Tomy 原廠配置與官方設計策略。"
  opt: "Optimal；單顆 Blade 依物理結構推導的理論最佳配置。"
  dck: "Deck；核心三機的目標永久配置。"
  tmp: "Temporary；目前已實際擁有零件可組出的暫時配置。"
policy:
  dck_definition: "使用者預計建立的三顆核心固定配裝。"
  dck_unique_rule: "核心三機的實際配裝不可同時重複使用同一個零件實體。"
  dck_pending_rule: "尚未定案的 ratchet / bit 保留空白，並在 role 標明待定。"
  target_availability_rule: "可記錄未來目標配裝，但尚未到貨的零件不得視為目前可用。"
  tmp_owned_only_rule: "tmp 僅能使用目前已實際擁有且已確認的零件。"
  random_variant_rule: "隨機款未確認前，主打款資訊不得視為實際取得零件；狐狸已確認為 CX-06-01，鯨魚已確認為 BX-36-01 Whale Wave 5-80E。"
  opt_rule: "opt 不依網路 META 擅自覆蓋；實測可修正 opt，但需保留理由。"
core_three:
  - rank: 1
    item_id: bbx-004
    blade: 藍鳳凰
    dck:
      ratchet: 1-50
      bit: LF
    role: 第一主攻、核心主力
    configuration_decided: true
    currently_buildable: false
  - rank: 2
    item_id: bbx-009
    blade: 女武神
    dck:
      ratchet: "一體化，無獨立 Ratchet"
      bit: J
    role: 第二主攻、Bound 爆發擊飛
    configuration_decided: true
    currently_buildable: false
  - rank: 3
    item_id: bbx-008
    blade: 狐狸
    dck:
      ratchet: ""
      bit: ""
    role: 連續追擊、廣範圍連打；配裝待定
    configuration_decided: false
    currently_buildable: false
tmp:
  - item_id: bbx-004
    blade: 藍鳳凰
    ratchet: 4-50
    bit: J
    strategy: "目前零件池的極限主攻配置；用最低可用高度製造下位攻擊，J 兼顧衝刺與後段續轉。"
    source_note: "4-50 為已持有散件；J 來自已持有的隕星龍。此配置與白狐 9-60GR 可同時組裝。"
    completion: "目前可組，完整配對待實測"
  - item_id: bbx-008
    blade: 白狐
    ratchet: 9-60
    bit: GR
    strategy: "目前零件池的極限連打配置；降低 CX 高度與 Ratchet 暴露，保留 GR 的連續 X Dash 與追擊能力。"
    source_note: "9-60 來自已持有的紅鳳凰；GR 為白狐原裝零件。此配置與藍鳳凰 4-50J 可同時組裝。"
    completion: "目前可組，完整配對待實測"
observations:
  - item_id: bbx-005
    blade: 天蠍
    note: "Scorpio Spear 原廠 0-70 Z 容易被紅鳳凰直接爆體；更換為 9-60 Z 後爆體問題明顯改善。然而整體性能過於平衡，攻擊性不足，持久面又不敵神杖（Wizard Rod）之流，缺乏鮮明特色與定位，因此退出核心陣容。"
