configuration_model:
  org: "Original；Takara Tomy 原廠配置與官方設計策略。"
  opt: "Optimal；單顆 Blade 依物理結構推導的理論最佳配置。"
  dck: "Deck；固定六機賽制下，零件不重複的永久配置。"
  tmp: "Temporary；目前已實際擁有零件可組出的暫時配置。"
policy:
  dck_definition: "使用者預計建立的六顆固定配裝。"
  dck_unique_rule: "固定六機之間 Ratchet 與 Bit 不重複；女武神不占用一般 Ratchet 名額。"
  dck_pending_rule: "dck 尚未定案前，ratchet / bit / strategy 維持空白。"
  tmp_owned_only_rule: "tmp 僅能使用目前已實際擁有且已確認的零件。"
  random_variant_rule: "鯨魚與狐狸的主打款資訊不得視為實際取得零件。"
  opt_rule: "opt 不依網路 META 擅自覆蓋；實測可修正 opt，但需保留理由。"
